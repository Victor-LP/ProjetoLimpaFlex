<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/styles.css">
    <title>Calculadora</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/calculadora.css">
</head>
<body>
    <header class="topbar">
        <a href="novoservico.html"><img src="./assets/img/back.png" alt="voltar"></a>
        <h1> Simulador </h1>
    </header>
    <main>
        <section class="retangulo">
        <article>
            <section class="bloco">
            <label class="elemento">Número de quartos:</label>
            <input type="number" class="elemento" min="0" step="1">
            <label class="elemento">Número de banheiros:</label>
            <input type="number" class="elemento" min="0" step="1">
            </section>

            <section class="bloco">
            <p class="elemento">Tipo de moradia:</p>
            <label class="opcao">
            <input type="radio" name="moradia" value="casa">
            <span>Casa</span>
            </label>
            <label class="opcao">
            <input type="radio" name="moradia" value="studio">
            <span>Studio</span>
            </label>
            <label class="opcao">
            <input type="radio" name="moradia" value="apartamento">
            <span>Apartamento</span>
            </label>
            </section>

            <section class="bloco">
            <p class="elemento">Serviços extras:</p>
            <label class="opcao">
            <input type="checkbox">
            <span>Limpeza dentro da geladeira</span>
            </label>
            <label class="opcao">
            <input type="checkbox">
            <span>Limpeza de janelas</span>
            </label>
            <label class="opcao">
            <input type="checkbox">
            <span>Limpeza de área externa</span>
            </label>
            </section>
            <button type="button" value="Simular" class="elemento" id="simular">Simular</button>
        </article>
        </section>
    </main>
    <footer class="rodape">
            <a href="mapa.html">
                <img src="./assets/img/maps-and-flags.png" alt="mapa">
            </a>

            <a href="index.html">
                <img src="./assets/img/home.png" alt="home">
            </a>

            <a href="financeiro.html">
                <img src="./assets/img/dollar-symbol.png" alt="financeiro">
            </a>
        </footer>
</body>
</html>
