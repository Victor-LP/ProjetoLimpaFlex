<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/calculadora.css">
</head>
<body>
    <header class="topbar">
        <a href="novoservico.html"><img src="./assets/img/back.png" alt="voltar"></a>
        <p> Simulador </p>
    </header>
    <main>
        <section class="retangulo">
        <article>
            <h2>Dados para a precificação</h2>
            <label>Número de quartos</label>
            <input type="number" min="0" step="1">
            <label>Número de banheiros</label>
            <input type="number" min="0" step="1">
            <p>Tipo de moradia:</p>
            <label>
                <input type="radio" name="moradia" value="casa">
                Casa
            </label>
            <label>
                <input type="radio" name="moradia" value="studio">
                Studio
            </label>
            <label>
                <input type="radio" name="moradia" value="apartamento">
                Apartamento
            </label>
            <p>Serviços extras:</p>
            <label>Limpeza dentro da geladeira
                <input type="checkbox">
            </label>
            <label>Limpeza de janelas
                <input type="checkbox">
            </label>

            <label>Limpeza de área externa
                <input type="checkbox">
            </label>

            <button type="button" value="Simular">Simular</button>
        </article>
        </section>
    </main>
    <footer class="rodape">
            <a href="mapa.html">
                <img src="./assets/img/maps-and-flags.png" alt="mapa">
            </a>

            <a href="index.html">
                <img src="./assets/img/home.png" alt="home">
            </a>

            <a href="financeiro.html">
                <img src="./assets/img/dollar-symbol.png" alt="financeiro">
            </a>
        </footer>
</body>
</html>
