<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/novosevico.css">
    <link rel="stylesheet" href="css/calculadora.css">
    <script src="script/novoservico.js"></script>
    <script src="script/calculadora.js"></script>
    <title>Novo Serviço</title>
</head>
<body>
    <header class="topbar">
        <img src="./assets/img/logo.png" alt="menu" class="logo">
        <h1>Adicionar Novo Serviço</h1>
    </header>
    <main class="destaque novoservico-main">
        <article class="artigo">
            <h1 class="principal" headingoffset="1">
                Cadastrar uma Diária
            </h1>
            <section>
                <h2 class="form-titulo">Dados do cliente</h2>
                <div class="campo">
                    <label>Nome do cliente</label>
                    <input type="text" id="nome-cliente" placeholder="Nome Completo">
                </div>
                <div class="campo">
                    <label>Salvar como cliente frequente?</label>
                    <div class="radio-grupo">
                        <label><input type="radio" name="favorito" value="sim"> Sim</label>
                        <label><input type="radio" name="favorito" value="nao" checked> Não</label>
                    </div>
                </div>
            </section>
            <section>
                <h2 class="form-titulo">Endereço</h2>
                <div class="campo">
                    <h2>Rua / Avenida</h2>
                    <input type="text" id="rua" placeholder="Ex: Avenida Paulista">
                </div>
                <div class="campo-grupo">
                    <div class="campo">
                        <label for="numero">Número</label>
                        <input type="number" id="numero" min="0" step="1" placeholder="0">
                    </div>
                    <div class="campo">
                        <label for="bairro">Bairro</label>
                        <input type="text" id="bairro" placeholder="Ex: Bela Vista">
                    </div>
                </div>
                <div class="campo">
                    <label for="complemento">Tem complemento?</label>
                    <div class="radio-grupo">
                        <label><input type="radio" name="tem-complemento" value="sim"> Sim</label>
                        <label><input type="radio" name="tem-complemento" value="nao" checked> Não</label>
                    </div>
                </div>
                <div class="campo" id="campo-complemento">
                    <label for="complemento">Complemento</label>
                    <input type="text" id="complemento" placeholder="Ex: Apto 42, Bloco B">
                </div>
            </section>
            <!-- Data e Hora -->
            <section>
                <h2 class="form-titulo">Data e Hora</h2>
                <div class="campo">
                    <label for="data-hora">Data e hora do serviço</label>
                    <input type="datetime-local" id="data-hora">
                </div>
            </section>
            <!-- Valor -->
            <section>
                <h2 class="form-titulo">Valor do Serviço</h2>
                <div class="campo">
                    <label for="valor">Valor (R$)</label>
                    <input type="number" id="valor" min="0" step="0.01" placeholder="0,00">
                </div>
                <p class="simulador">Com dúvidas para precificar? Usar a Calculadora </p>
                <p class="simulador"><img src="./assets/img/calculator.png" class="icon" alt="simular preço"></p>
            </section>
            <button type="button" class="botao-salvar" id="btn-salvar">Salvar Serviço</button>
        </article>
        <div class="calculadora-main">
        <section class="bloco">
            <h2 class="elemento">Número de quartos:</h2>
            <input type="number" class="elemento" min="0" step="1">
            <h2 class="elemento">Número de banheiros:</h2>
            <input type="number" class="elemento" min="0" step="1">
            <h2 class="elemento">Tipo de moradia:</h2>
            <label class="opcao">
                <input type="radio" name="moradia" value="casa">
                <span>Casa</span>
            </label>
            <label class="opcao">
                <input type="radio" name="moradia" value="studio">
                <span>Studio</span>
            </label>
            <label class="opcao">
                <input type="radio" name="moradia" value="apartamento">
                <span>Apartamento</span>
            </label>
            <h2 class="elemento">Serviços extras:</h2>
            <label class="opcao">
                <input type="checkbox">
                <span>Limpeza dentro da geladeira</span>
            </label>
            <label class="opcao">
                <input type="checkbox">
                <span>Limpeza de janelas</span>
            </label>
            <label class="opcao">
                <input type="checkbox">
                <span>Limpeza de área externa</span>
            </label>
        </section>
        <button type="button" value="Simular" class="elemento" id="simular">Simular</button>
    </div>
    </main>
    <footer class="rodape">
        <a href="mapa.html"><img src="./assets/img/maps-and-flags.png" alt="mapa"></a>
        <a href="index.html"><img src="./assets/img/home.png" alt="home"></a>
        <a href="financeiro.html"><img src="./assets/img/dollar-symbol.png" alt="financeiro"></a>
    </footer>
</body>
</html>
