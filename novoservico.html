<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/novosevico.css">
    <title>Novo Serviço</title>
</head>
<body>
    <header class="topbar">
        <a href="index.html"><img src="./assets/img/back.png" alt="voltar"></a>
        <h1>Adicionar Novo Serviço</h1>
    </header>
 
    <main class="destaque novoservico-main">
 
        <section class="artigo">
            <section>
                <h2 class="form-titulo">Dados do Cliente</h2>
    
                <div class="campo">
                    <label for="nome-cliente">Nome do cliente</label>
                    <input type="text" id="nome-cliente" placeholder="Ex: Marina Silva">
                </div>
    
                <div class="campo">
                    <label>Salvar como cliente frequente?</label>
                    <div class="radio-grupo">
                        <label><input type="radio" name="favorito" value="sim"> Sim</label>
                        <label><input type="radio" name="favorito" value="nao" checked> Não</label>
                    </div>
                </div>
            </section>
    
            <section>
                <h2 class="form-titulo">Endereço</h2>
    
                <div class="campo">
                    <label for="rua">Rua / Avenida</label>
                    <input type="text" id="rua" placeholder="Ex: Avenida Paulista">
                </div>
    
                <div class="campo-grupo">
                    <div class="campo">
                        <label for="numero">Número</label>
                        <input type="number" id="numero" min="0" step="1" placeholder="0">
                    </div>
                    <div class="campo campo-largo">
                        <label for="bairro">Bairro</label>
                        <input type="text" id="bairro" placeholder="Ex: Bela Vista">
                    </div>
                </div>
    
                <div class="campo">
                    <label>Tem complemento?</label>
                    <div class="radio-grupo">
                        <label><input type="radio" name="tem-complemento" value="sim"> Sim</label>
                        <label><input type="radio" name="tem-complemento" value="nao" checked> Não</label>
                    </div>
                </div>
    
                <div class="campo" id="campo-complemento" style="display:none">
                    <label for="complemento">Complemento</label>
                    <input type="text" id="complemento" placeholder="Ex: Apto 42, Bloco B">
                </div>
            </section>
    
            <!-- Data e Hora -->
            <section>
                <h2 class="form-titulo">Data e Hora</h2>
    
                <div class="campo">
                    <label for="data-hora">Data e hora do serviço</label>
                    <input type="datetime-local" id="data-hora">
                </div>
            </section>
    
            <!-- Valor -->
            <section>
                <h2 class="form-titulo">Valor do Serviço</h2>
    
                <div class="campo">
                    <label for="valor">Valor (R$)</label>
                    <input type="number" id="valor" min="0" step="0.01" placeholder="0,00">
                </div>
    
                <p>Com dúvidas para precificar? <a href="calculadora.html">Usar a Calculadora</a></p>
            </section>
    
            <button type="button" class="botao-salvar" id="btn-salvar">Salvar Serviço</button>
            
        </section>
    </main>
 
    <footer class="rodape">
        <a href="mapa.html"><img src="./assets/img/maps-and-flags.png" alt="mapa"></a>
        <a href="index.html"><img src="./assets/img/home.png" alt="home"></a>
        <a href="financeiro.html"><img src="./assets/img/dollar-symbol.png" alt="financeiro"></a>
    </footer>

</body>
</html>
