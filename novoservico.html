<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Serviço</title>
</head>
<body>
    <header>
        <a href="index.html"><img src="./assets/img/back.png" alt="voltar"></a>
        <h1>
            Adicionar Novo Serviço
        </h1>
    </header>
    <main>
        <form action="index.html" method="get">
            <article>
                <label>Nome do cliente</label>
                <input type="text">
                <label>Rua</label>
                <input type="text">
                <label>Número</label>
                <input type="number" min="0" step="1">
                <label>Complemento</label>
                <input type="text">
                <label>sim</label>
                <input type="radio" name="complemento">
                <label>não</label>
                <input type="radio" name="complemento">
            </article>
            <article>
                <label>Valor do Serviço</label>
                <input type="number" min="0" step="0.01" >
                <h2>
                    Caso tenha dúvidas para precificar:
                </h2>
                <h3>
                    Utilizar Calculadora de Precificação? <a href="calculadora.html"><img src="./assets/img/calculator.png" alt="calculadora de precificação"></a>
                </h3>
            </article>
            <button type="submit">Salvar</button>
        </form>
    </main>
</body>
</html>
