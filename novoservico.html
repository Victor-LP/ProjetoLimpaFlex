<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Serviço</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="cab">
        <a href="index.html"><img src="./assets/img/back.png" alt="voltar"></a>
        <h1>
            Adicionar Novo Serviço
        </h1>
    </header>

    <main>
        <form action="index.html" method="get">
            <article>
                <label>Nome do cliente</label>
                <input type="text">
                <label>adicionar aos favoritos?</label> <!-- A ideia é ter uma funcionalidade de clientes recorrentes-->
                <input type="radio">

                <label>Rua</label>
                <input type="text">
                <label>Número</label>
                <input type="number" min="0" step="1">
                <label>Complemento</label>
                <input type="text">
                <label>sim</label>
                <input type="radio" name="complemento">
                <label>não</label>
                <input type="radio" name="complemento">

                <label>Data e Hora do Serviço</label>
                <input type="datetime-local">
            </article>


            <article>
                <label>Valor do Serviço</label>
                <input type="number" min="0" step="0.01" >
                <h2>
                    Caso tenha dúvidas para precificar:
                </h2>
                <h3>
                    Utilizar Calculadora de Precificação? <a href="calculadora.html"><img src="./assets/img/calculator.png" alt="calculadora de precificação"></a>
                </h3>
            </article>
            <button type="submit">Salvar</button>
        </form>
    </main>
    <footer class="rodape">
            <a href="mapa.html">
                <img src="./assets/img/maps-and-flags.png" alt="mapa">
            </a>

            <a href="index.html">
                <img src="./assets/img/home.png" alt="home">
            </a>

            <a href="financeiro.html">
                <img src="./assets/img/dollar-symbol.png" alt="financeiro">
            </a>
        </footer>
</body>
</html>
