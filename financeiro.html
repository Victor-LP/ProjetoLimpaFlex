<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/styles.css"> 
    <link rel="stylesheet" href="css/financeiro.css"> 
    <title>Controle Financeiro</title>
</head>
<body>
    <header class="topbar">
        <a href="index.html">
            <img src="./assets/img/back.png" alt="voltar">
        </a>
        <h1>Controle Financeiro</h1>
        <!-- Centralizar o h1 -->
        <span style="width: 3rem;"></span> 
    </header>

    <!-- Joga pra baixo do header -->
    <main class="destaque financeiro-main">
        
        <!-- Bloco de Saldo -->
        <section class="saldo-box">
            <h2>Saldo</h2>
            <p class="valor-principal">R$ 300,00</p>
            <p class="valor-receber">A receber: <strong>R$ 470,00</strong></p>
        </section>

        <!-- Lista de Pagamentos -->
        <section class="pagamentos-lista">
            <h2 class="titulo-secao">Pagamentos Pendentes</h2>


            <article class="artigo card-pagamento">
                
                <!-- Cabeçalho do card -->
                <header class="cliente-info">
                    <img src="./assets/img/pessoa2.png" alt="Camila Santos" class="icon">
                    <h3>Camila Silva</h3>
                </header>

                <!-- Listar os serviços -->
                <ul class="servicos-lista">
                    <li>
                        <span>Transporte</span>
                        <span>R$ 30,00</span>
                    </li>
                    <li>
                        <span>Serviço</span>
                        <span>R$ 400,00</span>
                    </li>
                    <li>
                        <span>Alimentação</span>
                        <span>R$ 40,00</span>
                    </li>
                </ul>

                <!-- Finalzinho do card -->
                <footer class="total-box">
                    <strong>Total</strong>
                    <strong class="tag-pendente">R$ 470,00 (Pendente)</strong>
                </footer>
            </article>

        </section>
    </main>

    <footer class="rodape">
        <a href="mapa.html"><img src="./assets/img/maps-and-flags.png" alt="mapa"></a>
        <a href="index.html"><img src="./assets/img/home.png" alt="home"></a>
        <a href="financeiro.html"><img src="./assets/img/dollar-symbol.png" alt="financeiro"></a>
    </footer>
</body>
</html>
